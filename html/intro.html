<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attentus - Intro</title>
    <link rel="stylesheet" href="../css/intro.css">
</head>
<body>

    <header>
        <h1>Attentus</h1>

        <button id="btnPerfil" class="profile-btn">
            👤
        </button>
    </header>

    <main>

        <h2>Explora a Attentus</h2>

        <section class="games-grid">

            <div
                class="game-card reaction-card"
                id="cardReacao"
            >
                <div class="reaction-content">
                    <img src="../assets/images/carro.png" alt="Carro">
                    <img src="../assets/images/semaforo.png" alt="Semáforo">
                </div>

                <span>Jogo da reação</span>
            </div>

            <div
                class="game-card sequence-card"
                id="cardSequencia"
            >
                <h3>Repetir sequência</h3>

                <div class="colors-grid">
                    <div class="red"></div>
                    <div class="yellow"></div>
                    <div class="green"></div>
                    <div class="blue"></div>
                    <div class="orange"></div>
                    <div class="purple"></div>
                    <div class="white"></div>
                    <div class="pink"></div>
                    <div class="cyan"></div>
                </div>
            </div>

            <div
                class="game-card target-card"
                id="cardAlvo"
            >

                <img
                    src="../assets/images/target.png"
                    alt=""
                >

                <span>Jogo do alvo</span>

            </div>

        </section>

    </main>

    <div id="introModal" class="hidden">

        <div class="modal-content">

            <h2>Parabéns!</h2>

            <p>
                Já experimentaste a Attentus.
            </p>

            <button id="btnContinuar">
                Continuar
            </button>

        </div>

    </div>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
