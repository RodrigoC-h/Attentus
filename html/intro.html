<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attentus - Intro</title>
    <link rel="stylesheet" href="../css/intro.css">
</head>
<body>

    <header>
        <h1>Attentus</h1>

        <button id="btnPerfil" class="profile-btn">
            👤
        </button>
    </header>

    <main>

        <h2>Explora a Attentus</h2>

        <section class="games-grid">

            <div class="game-card reaction-card">
                <div class="reaction-content">
                    <img src="../assets/images/carro.png" alt="Carro">
                    <img src="../assets/images/semaforo.png" alt="Semáforo">
                </div>

                <span>Jogo da reação</span>
            </div>

            <div class="game-card sequence-card">
                <h3>Repetir sequência</h3>

                <div class="colors-grid">
                    <div class="red"></div>
                    <div class="yellow"></div>
                    <div class="green"></div>
                    <div class="blue"></div>
                    <div class="orange"></div>
                    <div class="purple"></div>
                    <div class="white"></div>
                    <div class="pink"></div>
                    <div class="cyan"></div>
                </div>
            </div>

            <div class="game-card focus-card">

                <div class="focus-items">

                    <img src="../assets/images/book.png" alt="">
                    <img src="../assets/images/football.png" alt="">
                    <img src="../assets/images/mug.png" alt="">
                    <img src="../assets/images/backpack.png" alt="">

                    <img src="../assets/images/plant.png" alt="">
                    <img src="../assets/images/magnifying-glass.png" alt="">
                    <img src="../assets/images/camera.png" alt="">

                </div>

                <span>Jogo do foco</span>

            </div>

            <div class="left-column">

                <div class="game-card organization-card">

                    <h4>Jogo de organização</h4>

                    <img src="../assets/images/shelf.png" alt="">

                </div>

                <div class="game-card escape-card">

                    <img src="../assets/images/escape-room.png" alt="">

                    <span>Escape room</span>

                </div>

            </div>

            <div class="game-card target-card">

                <img src="../assets/images/target.png" alt="">

                <span>Jogo do alvo</span>

            </div>

        </section>

    </main>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
