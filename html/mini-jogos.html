<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attentus - Mini Jogos</title>
    <link rel="stylesheet" href="../css/mini-jogos.css">
</head>
<body>

<header>
    <h1 id="logo" class="logo">Attentus</h1>

    <div class="header-icons">
        <button id="btnPerfil">
            👤
        </button>
    </div>
</header>

    <main>

        <section class="games-grid">

            <div id="cardReacao" class="game-card reaction">
                <h3>Jogo da reação</h3>
            </div>

            <div id="cardSequencia" class="game-card sequence">
                <h3>Repetir sequência</h3>
            </div>

            <div id="cardFoco" class="game-card focus">
                <h3>Jogo do foco</h3>
            </div>

            <div id="cardAlvo" class="game-card target">
                <h3>Jogo do alvo</h3>
            </div>

        </section>

    </main>

    <script type="module" src="../js/app.js"></script>
    
</body>
</html>
