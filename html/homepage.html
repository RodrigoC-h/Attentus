<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attentus</title>
    <link rel="stylesheet" href="../css/homepage.css">
</head>
<body>

    <header class="header">
        <h1 id="logo">Attentus</h1>

        <div class="header-icons">
            <button id="btnPerfil" class="icon-btn">
                👤
            </button>

            <button id="btnDefinicoes" class="icon-btn">
                ⚙️
            </button>
        </div>
    </header>

    <main class="container">

        <!-- Dias -->
        <section class="dias">
            <div class="linha"></div>

            <div class="dias-container">
                <div class="dia">20</div>
                <div class="dia">21</div>
                <div class="dia">22</div>
                <div class="dia ativo">23</div>
                <div class="dia">24</div>
                <div class="dia">25</div>
                <div class="dia">26</div>
            </div>

            <div class="linha"></div>
        </section>

        <!-- Jogos recentes -->
        <section class="recent-games">

            <h2>
                Jogos recentemente jogados
            </h2>

            <div id="recentGamesContainer">

            </div>

        </section>

        <!-- Jogos -->
        <button id="btnMaisJogos" class="btn-mais">
            Mais jogos
        </button>

    </main>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
