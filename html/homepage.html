<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="../css/homepage.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="top-bar">
      <span>9:41</span>
    </div>

    <div class="title-bar">
      <h1>Attentus</h1>
      <div class="icons">
        <span>👤</span>
        <span>⚙️</span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DIAS -->
    <div class="days">
      <hr>
      <div class="day-list">
        <span>20</span>
        <span>21</span>
        <span>22</span>
        <span class="active">23</span>
        <span>24</span>
        <span>25</span>
        <span>26</span>
      </div>
      <hr>
    </div>

    <!-- TITULO -->
    <h2>Jogos recentemente jogados</h2>

    <!-- CARD JOGO -->
    <div class="game-card">
      <div class="car">🚗</div>
      <span>Jogo da reação</span>
    </div>

    <!-- GRID JOGOS -->
    <div class="games-grid">

      <div class="game box1">
        <p>Repetir sequência</p>
        <div class="colors">
          <span style="background:red"></span>
          <span style="background:yellow"></span>
          <span style="background:green"></span>
          <span style="background:blue"></span>
          <span style="background:orange"></span>
          <span style="background:purple"></span>
          <span style="background:white"></span>
          <span style="background:pink"></span>
          <span style="background:cyan"></span>
        </div>
      </div>

      <div class="game box2">
        <div class="target"></div>
        <p>Jogo do alvo</p>
      </div>

    </div>

    <!-- BOTÃO -->
    <button class="more-btn">Mais jogos</button>

  </div>

</div>

<script src="view.js"></script>
</body>
</html>
