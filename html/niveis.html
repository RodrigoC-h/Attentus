<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Níveis</title>
    <link rel="stylesheet" href="../css/niveis.css">
</head>
<body>

    <header>

        <div id="logo" class="logo">
            Attentus
        </div>

        <div class="header-icons">

            <button id="btnPerfil" class="icon-btn">
                👤
            </button>
        </div>

    </header>

    <main>

        <button id="btnVoltar" class="voltar-btn">
            Voltar
        </button>

        <section class="levels-container">

            <div class="level-row">
                <button class="level tutorial" data-level="0">Tut.</button>
                <div class="line"></div>
                <button class="level" data-level="1">1</button>
                <div class="line"></div>
                <button class="level" data-level="2">2</button>
                <div class="line"></div>
                <button class="level" data-level="3">3</button>
            </div>

            <div class="vertical right"></div>

            <div class="level-row reverse">
                <button class="level" data-level="7">7</button>
                <div class="line"></div>
                <button class="level" data-level="6">6</button>
                <div class="line"></div>
                <button class="level" data-level="5">5</button>
                <div class="line"></div>
                <button class="level" data-level="4">4</button>
            </div>

            <div class="vertical left"></div>

            <div class="level-row">
                <button class="level" data-level="8">8</button>
                <div class="line"></div>
                <button class="level" data-level="9">9</button>
                <div class="line"></div>
                <button class="level" data-level="10">10</button>
                <div class="line"></div>
                <button class="level" data-level="11">11</button>
            </div>

            <div class="vertical right"></div>

            <div class="level-row reverse">
                <button class="level" data-level="15">15</button>
                <div class="line"></div>
                <button class="level" data-level="14">14</button>
                <div class="line"></div>
                <button class="level" data-level="13">13</button>
                <div class="line"></div>
                <button class="level" data-level="12">12</button>
            </div>

            <div class="vertical left"></div>

            <div class="level-row">
                <button class="level" data-level="16">16</button>
                <div class="line"></div>
                <button class="level" data-level="17">17</button>
                <div class="line"></div>
                <button class="level" data-level="18">18</button>
                <div class="line"></div>
                <button class="level" data-level="19">19</button>
            </div>

            <div class="vertical right"></div>

            <div class="level-row reverse">
                <button class="level" data-level="23">23</button>
                <div class="line"></div>
                <button class="level" data-level="22">22</button>
                <div class="line"></div>
                <button class="level" data-level="21">21</button>
                <div class="line"></div>
                <button class="level" data-level="20">20</button>
            </div>

        </section>

    </main>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
