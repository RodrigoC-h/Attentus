<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Níveis</title>
    <link rel="stylesheet" href="../css/niveis.css">
</head>
<body>

<header>
    <div class="logo">Attentus</div>

    <div class="header-icons">
        <button class="icon-btn">👤</button>
        <button class="icon-btn">⚙️</button>
    </div>
</header>

    <main>

        <button class="voltar-btn">
            Voltar
        </button>

        <section class="levels-container">

            <div class="level-row">
                <button class="level tutorial">Tut.</button>
                <div class="line"></div>
                <button class="level">1</button>
                <div class="line"></div>
                <button class="level">2</button>
                <div class="line"></div>
                <button class="level">3</button>
            </div>

            <div class="vertical right"></div>

            <div class="level-row reverse">
                <button class="level">7</button>
                <div class="line"></div>
                <button class="level">6</button>
                <div class="line"></div>
                <button class="level">5</button>
                <div class="line"></div>
                <button class="level">4</button>
            </div>

            <div class="vertical left"></div>

            <div class="level-row">
                <button class="level">8</button>
                <div class="line"></div>
                <button class="level">9</button>
                <div class="line"></div>
                <button class="level">10</button>
                <div class="line"></div>
                <button class="level">11</button>
            </div>

            <div class="vertical right"></div>

            <div class="level-row reverse">
                <button class="level">15</button>
                <div class="line"></div>
                <button class="level">14</button>
                <div class="line"></div>
                <button class="level">13</button>
                <div class="line"></div>
                <button class="level">12</button>
            </div>

            <div class="vertical left"></div>

            <div class="level-row">
                <button class="level">16</button>
                <div class="line"></div>
                <button class="level">17</button>
                <div class="line"></div>
                <button class="level">18</button>
                <div class="line"></div>
                <button class="level">19</button>
            </div>

            <div class="vertical right"></div>

            <div class="level-row reverse">
                <button class="level">23</button>
                <div class="line"></div>
                <button class="level">22</button>
                <div class="line"></div>
                <button class="level">21</button>
                <div class="line"></div>
                <button class="level">20</button>
            </div>

        </section>

    </main>

</body>
</html>
