<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="../css/perfil.css">
</head>
<body>

    <header>
        <h1 id="logo">Attentus</h1>

        <button id="btnDefinicoes" class="settings-btn">
            ⚙️
        </button>
    </header>

    <main>

        <section class="top-section">

            <div class="left-column">

                <div class="avatar-container">

                    <img
                        id="avatarBase"
                        class="avatar-layer"
                    >

                    <img
                        id="avatarFace"
                        class="avatar-layer"
                    >

                    <img
                        id="avatarHat"
                        class="avatar-layer"
                    >

                </div>

                <button id="btnEditar" class="edit-btn">
                    EDITAR ✎
                </button>

            </div>

            <div class="right-column">

                <div class="card user-card">

                    <div id="username" class="username">
                        User
                    </div>

                    <div class="equipped">

                        <div class="equip-circle">
                            <img id="achievement1" style="display:none;">
                        </div>

                        <div class="equip-circle">
                            <img id="achievement2" style="display:none;">
                        </div>

                        <div class="equip-circle">
                            <img id="achievement3" style="display:none;">
                        </div>

                    </div>

                </div>

                <div class="card xp-card">
                    
                    <h3>
                        Nível
                        <span id="level">
                            1
                        </span>
                    </h3>

                    <span id="xpText">
                        0 / 100
                    </span>

                    <div class="xp-bar">
                        <div id="xpFill" class="xp-fill"></div>
                    </div>

                </div>

                <div class="card saldo-card">

                    <span>Saldo:</span>

                    <div id="saldo" class="saldo-value">
                        0 🪙
                    </div>

                </div>

            </div>

        </section>

        <section class="conquistas-card">

            <h2>Conquistas</h2>

            <div
                id="conquistasContainer"
                class="conquistas"
            ></div>

            <div
                id="expandAchievements"
                class="expand-btn"
            >
                ↓
            </div>

        </section>

        <button id="btnLogout" class="logout-btn">
            ⎋ Terminar sessão
        </button>

    </main>
    
    <script type="module" src="../js/app.js"></script>

</body>
</html>
