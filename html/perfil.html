<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="../css/perfil.css">
</head>
<body>

    <header>
        <h1 id="logo">Attentus</h1>

        <button id="btnDefinicoes" class="settings-btn">
            ⚙️
        </button>
    </header>

    <main>

        <section class="top-section">

            <div class="left-column">

                <div class="avatar-container">
                    <img src="../assets/images/avatar.png" alt="Avatar">
                </div>

                <button id="btnEditar" class="edit-btn">
                    EDITAR ✎
                </button>

            </div>

            <div class="right-column">

                <div class="card user-card">

                    <div id="username" class="username">
                        User
                    </div>

                    <div class="equipped">

                        <div class="equip-circle">
                            🏆
                        </div>

                        <div class="equip-circle"></div>

                        <div class="equip-circle"></div>

                    </div>

                </div>

                <div class="card xp-card">
                    
                    <h3>
                        Nível
                        <span id="level">
                            1
                        </span>
                    </h3>

                    <span id="xpText">
                        0 / 100
                    </span>

                    <div class="xp-bar">
                        <div id="xpFill" class="xp-fill"></div>
                    </div>

                </div>

                <div class="card saldo-card">

                    <span>Saldo:</span>

                    <div id="saldo" class="saldo-value">
                        0 🪙
                    </div>

                </div>

            </div>

        </section>

        <section class="conquistas-card">

            <h2>Conquistas</h2>

            <div class="conquistas">

                <div class="conquista">
                    <img src="../assets/images/conquista1.png" alt="">
                    <h4>Primeira Vitória</h4>
                    <span>Completado</span>

                    <div class="progress">
                        <div class="progress-fill full"></div>
                    </div>
                </div>

                <div class="conquista">
                    <img src="../assets/images/conquista2.png" alt="">
                    <h4>10 Jogos Jogados</h4>
                    <span>7/10</span>

                    <div class="progress">
                        <div class="progress-fill medium"></div>
                    </div>
                </div>

                <div class="conquista">
                    <img src="../assets/images/conquista3.png" alt="">
                    <h4>Ofensiva</h4>
                    <span>7/15 Dias</span>

                    <div class="progress">
                        <div class="progress-fill half"></div>
                    </div>
                </div>

            </div>

            <div class="expand-btn">
                ↓
            </div>

        </section>

        <button id="btnLogout" class="logout-btn">
            ⎋ Terminar sessão
        </button>

    </main>
    
    <script type="module" src="../js/app.js"></script>

</body>
</html>
