<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attentus - Definições</title>
    <link rel="stylesheet" href="../css/definiçoes.css">
</head>
<body>

<div class="phone">

    <!-- Header -->
    <header>
        <h1>Attentus</h1>
        <div class="user-icon">👤</div>
    </header>

    <!-- Título -->
    <section class="settings-title">
        ⚙️ Definições
    </section>

    <!-- Slider efeitos -->
    <div class="slider-group">
        <label>🔊 Efeitos de som</label>
        <input type="range" id="soundSlider" min="0" max="100" value="55">
    </div>

    <!-- Slider música -->
    <div class="slider-group">
        <label>🎵 Música</label>
        <input type="range" id="musicSlider" min="0" max="100" value="75">
    </div>

    <!-- Botão ajuda -->
    <button class="menu-btn" id="supportBtn">
        ❓ Ajuda e suporte
    </button>

    <!-- Popup ajuda -->
    <div class="popup hidden" id="supportPopup">
        <div class="option">💬 FAQ</div>
        <div class="option">📘 Guia</div>
        <div class="option">✉ support@attentus.com</div>
        <div class="option">📞 +351 912 345 678</div>
    </div>

    <!-- Botão linguagem -->
    <button class="menu-btn" id="languageBtn">
        🌐 Linguagem
    </button>

    <!-- Popup linguagem -->
    <div class="popup hidden" id="languagePopup">
        <div class="option-language" data-lang="Português">🇵🇹 Português</div>
        <div class="option-language" data-lang="English">🇬🇧 English</div>
        <div class="option-language" data-lang="Español">🇪🇸 Español</div>
        <div class="option-language" data-lang="Deutsch">🇩🇪 Deutsch</div>
        <div class="option-language" data-lang="Français">🇫🇷 Français</div>
        <div class="option-language" data-lang="中文">🇨🇳 中文</div>
    </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
