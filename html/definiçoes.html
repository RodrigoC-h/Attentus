<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Definições</title>
  <link rel="stylesheet" href="../css/definiçoes.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="top-bar">
      <span class="time">9:41</span>
    </div>

    <div class="title-bar">
      <h1>Attentus</h1>
      <span class="user-icon">👤</span>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h2 class="section-title">
      ⚙️ Definições
    </h2>
    <hr>

    <!-- SLIDER SOM -->
    <div class="slider-group">
      <label>🔉 Efeitos de som</label>
      <input type="range" id="sound" min="0" max="100">
    </div>

    <hr>

    <!-- SLIDER MUSICA -->
    <div class="slider-group">
      <label>🎵 Música</label>
      <input type="range" id="music" min="0" max="100">
    </div>

    <hr>

    <!-- BOTÃO AJUDA -->
    <button class="btn" id="helpBtn">
      <span>❓</span> Ajuda e suporte
    </button>

    <hr>

    <!-- BOTÃO LINGUAGEM -->
    <button class="btn" id="langBtn">
      <span>🌐</span> Linguagem
    </button>

    <hr>

  </div>

  <!-- HOME INDICATOR -->
  <div class="home-indicator"></div>

</div>

<script src="view.js"></script>
</body>
</html>
