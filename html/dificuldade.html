<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dificuldades</title>
    <link rel="stylesheet" href="../css/dificuldade.css">
</head>
<body>

    <header>
        <div id="logo" class="logo">Attentus</div>

        <div class="header-icons">
            <button id="btnPerfil" class="icon-btn">👤</button>
            <button id="btnDefinicoes" class="icon-btn">⚙️</button>
        </div>
    </header>

    <main>

        <button id="btnVoltar" class="voltar-btn">
            Voltar
        </button>

        <div class="dificuldades">

            <button id="btnFacil" class="dificuldade facil">
                Fácil
            </button>

            <button id="btnMedio" class="dificuldade medio">
                Médio
            </button>

            <button id="btnDificil" class="dificuldade dificil">
                Difícil
            </button>

        </div>

    </main>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
