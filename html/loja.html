<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Attentus</title>
    <link rel="stylesheet" href="../css/loja.css">
</head>
<body>

<header>
    <h1 id="logo" class="logo">Attentus</h1>

    <div class="header-icons">
        <button id="btnPerfil" class="icon-btn">
            👤
        </button>
    </div>
</header>

    <main>

        <section class="shop-container">

            <!-- Categorias -->

            <div class="tabs">

                <button id="tabHead" class="tab active">
                    🎩
                </button>

                <button id="tabFace" class="tab">
                    🕶️
                </button>

                <button id="tabColor" class="tab">
                    🎨
                </button>

                <button id="tabAchievement" class="tab">
                    🏆
                </button>

            </div>

            <!-- Itens -->

            <div
                id="itemsContainer"
                class="items-grid"
            ></div>

        </section>

    </main>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
