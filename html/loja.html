<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Attentus</title>
    <link rel="stylesheet" href="../css/loja.css">
</head>
<body>

<header>
    <h1 id="logo" class="logo">Attentus</h1>

    <div class="header-icons">
        <button id="btnPerfil" class="icon-btn">
            👤
        </button>
        <button id="btnDefinicoes" class="icon-btn">
            ⚙️
        </button>
    </div>
</header>

    <main>

        <section class="shop-container">

            <!-- Avatar -->

            <div class="avatar-area">
                <div class="avatar-circle">
                    <img src="../assets/imagens/avatar.png" alt="Avatar">
                </div>
            </div>

            <!-- Categorias -->

            <div class="tabs">

                <button class="tab active">
                    🎩
                </button>

                <button class="tab">
                    🕶️
                </button>

                <button class="tab">
                    🎨
                </button>

                <button class="tab">
                    🏆
                </button>

            </div>

            <!-- Itens -->

            <div class="items-grid">

                <div class="item-card">
                    <img src="../assets/imagens/boné.png" alt="Boné">

                    <button class="equipado-btn">
                        Equipado
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/headphones.png" alt="Headphones">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/cartola.png" alt="Cartola">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/coroa.png" alt="Coroa">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/chapeu.png" alt="Chapéu">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/laco.png" alt="Laço">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/halo.png" alt="Halo">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/nuvem.png" alt="Nuvem">

                    <button class="comprar-btn">
                        10 🪙
                    </button>
                </div>

                <div class="item-card">
                    <img src="../assets/imagens/atti-icon.png" alt="Atti">

                    <button class="comprar-btn">
                      10 🪙
                    </button>
                </div>

            </div>

        </section>

    </main>

    <script type="module" src="../js/app.js"></script>

</body>
</html>
