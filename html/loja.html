<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/loja.css">
</head>
<body>
    <div class="shop-container">
  <header class="shop-header">
    <h1 class="logo">Attentus</h1>
    <div class="header-icons">
      <button class="icon-btn"><i class="fas fa-user"></i></button> <button class="icon-btn"><i class="fas fa-cog"></i></button>
    </div>
  </header>
  <main class="shop-card">
    <section class="avatar-preview">
      <div class="avatar-circle">
        <img src="caminho/para/avatar.png" alt="Avatar Preview">
      </div>
    </section>

    <nav class="categories-tabs">
      <button class="tab-btn active"><i class="fas fa-hat-wizard"></i></button>
      <button class="tab-btn"><i class="fas fa-glasses"></i></button>
      <button class="tab-btn"><i class="fas fa-palette"></i></button>
      <button class="tab-btn"><i class="fas fa-trophy"></i></button>
    </nav>

   <section class="items-grid">
      
      <div class="item-box equipped">
        <div class="item-image">
          <img src="caminho/para/bone.png" alt="Boné Roxo">
        </div>
        <button class="item-status-btn equipped-text">Equipado</button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/auscultadores.png" alt="Auscultadores">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/cartola.png" alt="Cartola">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/coroa.png" alt="Coroa">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/chapeu-pescador.png" alt="Chapéu de Pescador">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/lacinho.png" alt="Laço Cor-de-Rosa">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/aureola.png" alt="Auréola">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/nuvem.png" alt="Nuvem">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

      <div class="item-box">
        <div class="item-image">
          <img src="caminho/para/mascote-mini.png" alt="Mascote Azul">
        </div>
        <button class="item-status-btn buy-btn">
          <span>10</span> <img src="caminho/para/moeda.png" alt="Moedas" class="coin-icon">
        </button>
      </div>

    </section>
  </main>
</div>
</body>
</html>
